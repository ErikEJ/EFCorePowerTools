services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: DockerPlayground-mssql-2022
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: "Password!"
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql

volumes:
  mssql-data: